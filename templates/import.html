{% extends "base.html" %}

{% block content %}
<section class="import-form">
    <h2>Kontakte importieren</h2>

    <form method="post" action="{{ url_for('import_contacts') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">JSON-Datei auswählen</label>
            <input type="file" id="file" name="file" accept=".json" required>
        </div>

        <div class="form-group">
            <label>Importmodus</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="mode" value="replace" checked>
                    Ersetzen – Bestehende Kontakte werden gelöscht
                </label>
                <label>
                    <input type="radio" name="mode" value="merge">
                    Zusammenführen – Importierte Kontakte werden hinzugefügt
                </label>
            </div>
        </div>

        <button type="submit">Importieren</button>
    </form>

    <p><a href="{{ url_for('index') }}">Zurück zur Warteliste</a></p>
</section>
{% endblock %}
